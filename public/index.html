<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Landi Lifts</title>
<meta name="theme-color" content="#18181a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Landi Lifts">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260622b">
</head>
<body>
<div class="splash" id="splash">
  <div class="splashin">
    <div class="splogo">Landi<span class="b2">/lifts</span></div>
    <div class="spline"></div>
    <div class="spquote">Anything worth doing<br>is worth <b>overdoing</b>.</div>
  </div>
</div>
<header>
  <div class="hbar">
    <div class="brand">Landi<span class="b2">/lifts</span></div>
    <div class="spacer"></div>
    <div class="todaydate" id="todayDate"></div>
    <button class="userchip" id="userChip" aria-label="Switch user" style="display:none"></button>
    <button class="iconbtn" id="guideBtn" aria-label="Guide &amp; reference">i</button>
  </div>
  <div class="segwrap">
    <div class="seg" id="seg">
      <button class="segbtn on" data-v="train">Train</button>
      <button class="segbtn" data-v="prog">Progress</button>
    </div>
  </div>
  <div id="trainNav">
  <div class="weeknav">
    <button class="wbtn" id="prevWk" aria-label="Previous week">‹</button>
    <div class="winfo">
      <div class="wk" id="wkLabel">Week 1</div>
      <div class="meta" id="wkMeta"></div>
    </div>
    <button class="wbtn" id="nextWk" aria-label="Next week">›</button>
  </div>
  <div class="tabs" id="tabs"></div>
  </div>
</header>

<div class="wrap">
  <div id="trainView">
    <div class="daybar" id="daybar"></div>
    <div id="list"></div>
  </div>

  <div id="bodyView" style="display:none">
    <div class="reccard" id="recCard"></div>
    <div class="shelf" id="shelf"></div>
    <div class="bodycard">
      <div class="bcTop">
        <div class="bcEyebrow">Progression</div>
        <button class="metricsel" id="metricSel">Est. 1RM <span class="car">▾</span></button>
      </div>
      <button class="exsel" id="exSel">Pick an exercise <span class="car">▾</span></button>
      <div class="bcStats">
        <div><div class="bcLbl">Latest</div><div class="bcBig" id="curVal">–</div></div>
        <div><div class="bcLbl">Best</div><div class="bcBig pr" id="prVal">–</div></div>
      </div>
      <div class="bcUpd" id="curUpd"></div>
      <div class="chartbox" id="chartbox"></div>
      <button class="expbtn" id="expBtn" style="display:none">⤓ Save board as image</button>
    </div>
    <div class="histcard" id="histList"></div>
  </div>
</div>

<button class="fab" id="fab" aria-label="Rest timer">⏱</button>

<div class="timer" id="timer">
  <div class="big" id="tBig">2:00</div>
  <div class="presets" id="presets"></div>
  <div class="tctrls">
    <button class="t-se" id="tStart">Start</button>
    <button class="t-rs" id="tReset">Reset</button>
    <button class="t-cl" id="tClose">✕</button>
  </div>
</div>

<div class="toast" id="prToast">
  <div class="medal sm" id="prMedal"></div>
  <div class="tx">
    <div class="te">★ New personal record</div>
    <div class="tt" id="prToastBody"></div>
  </div>
</div>

<div class="scrim" id="scrim"><button class="sheetx" id="sheetX" aria-label="Close">✕</button><div class="sheet" id="sheet"></div></div>

<div class="signin" id="signin">
  <div class="siwrap">
    <div class="sibrand">Landi<span class="b2">/lifts</span></div>
    <div class="sihi">Who's lifting?</div>
    <div class="sibtns">
      <button class="sibtn" data-user="walt">Walt</button>
      <button class="sibtn" data-user="luke">Luke</button>
    </div>
    <div class="sinote">Your log syncs to the cloud and loads on any device.</div>
    <div class="sibuild">build 20260622b</div>
  </div>
</div>

<script src="data.js?v=20260622b"></script>
<script src="app.js?v=20260622b"></script>
</body>
</html>
